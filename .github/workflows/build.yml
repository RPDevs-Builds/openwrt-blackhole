name: Build Server Binaries

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goarch: arm64
            goos: linux
          - goarch: amd64
            goos: linux

    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.22'

    - name: Build
      env:
        GOOS: ${{ matrix.goos }}
        GOARCH: ${{ matrix.goarch }}
      run: go build -v -o blackhole-server-${{ matrix.goos }}-${{ matrix.goarch }} ./cmd/blackhole

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: blackhole-server-${{ matrix.goos }}-${{ matrix.goarch }}
        path: blackhole-server-${{ matrix.goos }}-${{ matrix.goarch }}
